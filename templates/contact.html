<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Base Camp // Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Share Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d0d0d;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
        }

        nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 1px solid #00ff41;
            display: flex;
            gap: 40px;
        }

        nav a {
            color: #00ff41;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #00ff41;
        }

        .contact-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 0 40px;
        }

        .contact-container h1 {
            font-size: 48px;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 20px #00ff41;
            margin-bottom: 16px;
        }

        .contact-container .subtitle {
            color: #aaffaa;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 48px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00ff41;
        }

        .form-group input,
        .form-group textarea {
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid rgba(0, 255, 65, 0.3);
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            padding: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 140px;
        }

        .btn {
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 14px 40px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            background: transparent;
            cursor: pointer;
            align-self: flex-start;
        }

        .btn:hover {
            background: #00ff41;
            color: #0d0d0d;
            box-shadow: 0 0 20px #00ff41;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/projects">Projects</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
</nav>

<div class="contact-container">
    <h1>// Contact</h1>
    <p class="subtitle">Transmit a message. Response time: fast.</p>

    <form class="contact-form">
        <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Your name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea placeholder="What do you need built?"></textarea>
        </div>
        <button class="btn" type="submit">Transmit</button>
    </form>
</div>

</body>
</html>
